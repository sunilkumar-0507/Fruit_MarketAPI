# Production stack for VPS: API + MySQL + Caddy (auto-HTTPS reverse proxy).
# Usage on the VPS:
#   cp .env.example .env   # then edit .env with real secrets + your domain
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"                      # internal only; Caddy talks to this, not the host
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=${MYSQL_DATABASE};User=root;Password=${MYSQL_ROOT_PASSWORD};"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "Fruitmarket.API"
      Jwt__Audience: "Fruitmarket.React"
      Cors__ReactOrigins__0: "https://tenkasifresh.in"
      Cors__ReactOrigins__1: "https://www.tenkasifresh.in"
      SeedAdmin__Email: "${SEED_ADMIN_EMAIL}"
      SeedAdmin__Password: "${SEED_ADMIN_PASSWORD}"
      # Email (password-reset & transactional mail). Set Email__Enabled=true once creds are filled.
      Email__Enabled: "${EMAIL_ENABLED:-false}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST:-smtp.hostinger.com}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT:-465}"
      Email__UseSsl: "${EMAIL_USE_SSL:-true}"
      Email__Username: "${EMAIL_USERNAME}"
      Email__Password: "${EMAIL_PASSWORD}"
      Email__FromAddress: "${EMAIL_FROM_ADDRESS}"
      Email__FromName: "${EMAIL_FROM_NAME:-Tenkasi Fresh}"
      Email__FrontendUrl: "${EMAIL_FRONTEND_URL:-https://tenkasifresh.in}"
    volumes:
      - uploads_data:/app/wwwroot/uploads   # persist uploaded product images across redeploys
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # stores Let's Encrypt certs (must persist!)
      - caddy_config:/config
    depends_on:
      - api
    environment:
      API_DOMAIN: "${API_DOMAIN}"

volumes:
  mysql_data:
  uploads_data:
  caddy_data:
  caddy_config:
